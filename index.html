
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayStation Offer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">

        <!-- ЛЕВАЯ КОЛОНКА С ИЗОБРАЖЕНИЯМИ ПОДПИСОК -->
        <div class="subscription-section">
            <!-- Место для изображения ESSENTIAL -->
            <div class="subscription-image essential">
                <img src="placeholder-essential.jpg" alt="Essential PlayStation Plus subscription icon" class="sub-img">
                <span class="subscription-text">ESSENTIAL</span>
            </div>
            
            <!-- Место для изображения EXTRA -->
            <div class="subscription-image extra">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTbY4jGu6Try3MNDkIg8QQLqrWYZIOAQPQSkg&s">
                <span class="subscription-text">EXTRA</span>
            </div>
            
            <!-- Место для изображения DELUXE -->
            <div class="subscription-image deluxe">
                <img src=" https://images.deal.by/459574643_w600_h600_459574643.jpg">
                <span class="subscription-text">DELUXE</span>
            </div>
        </div>

        <!-- ПРАВАЯ КОЛОНКА С ОСНОВНОЙ ИНФОРМАЦИЕЙ -->
        <div class="info-section">
            <!-- Заголовок PlayStation Plus с возможным логотипом -->
            <div class="playstation-title">
                <!-- Место для маленькой иконки PlayStation, если нужно -->
                <!-- <img src="ps-icon.jpg" alt="PlayStation icon" class="ps-icon"> -->
                PlayStation<span class="plus">Plus</span>
            </div>

            <!-- Блок PS4 Pro с изображением консоли -->
            <div class="ps4-pro-container">
                <!-- Место для картинки PS4 Pro -->
                <img src="https://warp.by/2320-medium_default/sony-ps4-pro-1tb.jpg">
                <div class="ps4-pro">PS4 Pro</div>
            </div>

            <!-- Даты и цены -->
            <div class="pricing-grid">
                <div class="date">September 15, 2016</div>
                <div class="price-row">
                    <span class="currency">$ 299</span>
                    <span class="currency">€ 299</span>
                    <span class="currency">£ 259</span>
                    <span class="currency">¥ 29,980</span>
                </div>

                <div class="date">November 10, 2016</div>
                <div class="price-row">
                    <span class="currency">$ 399</span>
                    <span class="currency">€ 399</span>
                    <span class="currency">£ 349</span>
                    <span class="currency">¥ 44,980</span>
                </div>
            </div>

            <!-- Нижний колонтитул PS.com с возможным логотипом -->
            <div class="footer">
                <!-- Место для маленькой иконки PS.com -->
                <!-- <img src="ps-icon-small.jpg" alt="PS.com icon" class="footer-icon"> -->
                PS.com
            </div>
        </div>
    </div>
</body>
</html>
